name: Deploy approved build

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Deployment request UUID
        required: true
        type: string
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - preview
          - staging
          - production

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-approved-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify request and repository contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'anon-key-placeholder' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check repository contracts
        run: npm run repo:guard

      - name: Check MCoder approval
        run: >
          npm run mcoder:check --
          --request-id "${{ inputs.request_id }}"
          --sha "${{ github.sha }}"
          --environment "${{ inputs.environment }}"

  deploy:
    name: Deploy after environment approval
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Consume approved request
        run: >
          npm run mcoder:consume --
          --request-id "${{ inputs.request_id }}"
          --sha "${{ github.sha }}"
          --environment "${{ inputs.environment }}"
          --run-id "${{ github.run_id }}"

      - name: Deployment provider disabled
        run: node scripts/deploy-disabled.mjs
